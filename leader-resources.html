<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Leader Resources</title>
    <link rel="icon" type="image/x-icon" href="images/trooplogo.png"> <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="Lead your troop with less stress & more confidence.">

    <!-- Keywords -->
    <meta name="keywords" content="your name, industry, and specialties">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://yourwebsite.com">

    <!-- Author Information -->
    <meta name="author" content="Colleen Farese">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <img class="avatar avatar--rounded" src="images/trooplogo.png" srcset="images/trooplogo.png 2x" alt="Troop Hub Logo">

            <!-- Replace with your name or brand -->
            <h1>
              <div>Leader Resources</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>Keeping families informed & prepared for every adventure.</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- My GS Log In-->
              <a href="https://mygs.girlscouts.org/"><a class="button button-goodreads" href="#" target="_blank" rel="noopener" role="button">My GS Log In</a>

              <!-- Cookie Season Tools-->
              <a class="button button-goodreads" href="#" target="_blank" rel="noopener" role="button">Cookie Season Tools</a>

              <!-- Troop Allergy Sheet-->
              <a href="https://mygs.girlscouts.org/"><a class="button button-goodreads" href="#" target="_blank" rel="noopener" role="button">Troop Allergy Sheet</a>

              <!-- Forms & Paperwork-->
              <a href="https://www.nccoastalpines.org/en/members/for-volunteers/forms-and-documents.html"><a class="button button-goodreads" href="#" target="_blank" rel="noopener" role="button">Forms & Paperwork</a>

              <!-- Troop Finances-->
              <a href="https://www.nccoastalpines.org/en/get-involved/join/membership-assistance.html"><a class="button button-goodreads" href="#" target="_blank" rel="noopener" role="button">Troop Finances</a>

              <!-- Planning Out the Year-->
              <a href="https://www.nccoastalpines.org/en/members/for-volunteers/forms-and-documents/financial-assistance-for-individuals-request.html"><a class="button button-goodreads" href="#" target="_blank" rel="noopener" role="button">Planning Out the Year</a>

              <!-- Bridging Ceremony-->
              <a class="button button-goodreads" href="#" target="_blank" rel="noopener" role="button">Bridging Ceremony</a>
                
              <!-- Volunteer & Training-->
              <a href="https://www.girlscouts.org/en/members/for-volunteers.html"><a class="button button-goodreads" href="#" target="_blank" rel="noopener" role="button">Volunteer & Training</a>

              <!-- Rallyhood-->
              <a href="https://rallyhood.com/"><a class="button button-goodreads" href="#" target="_blank" rel="noopener" role="button">Rallyhood</a>

              
      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <a href="privacy.html">Privacy Policy</a> | Created by <a href="https://littlelink.io" target="_blank" rel="noopener">TroopLoop</a>
      </footer>

    </div>
  </div>

</body>

</html>
