<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Brownies</title>
    <link rel="icon" type="image/x-icon" href="images/trooplogo.png"> <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="Keeping your girl scout prepared for every adventure">

    <!-- Keywords -->
    <meta name="keywords" content="your name, industry, and specialties">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://yourwebsite.com">

    <!-- Author Information -->
    <meta name="author" content="Colleen Farese">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->
    <style>
      body {
        background-color:#E49D53; /
      }
    </style>
  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <a href="index.html"><img class="avatar avatar--rounded" src="images/trooplogo.png" srcset="images/trooplogo.png 2x" alt="Troop Hub Logo"></a>

            <!-- Replace with your name or brand -->
            <h1>
              <div>Brownies</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>Keeping your girl scout prepared for every adventure.</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- Badges, Journeys, Awards-->
              <a href="https://www.girlscouts.org/content/dam/gsusa/forms-and-documents/members/highest-awards/Brownie_GSUSA_BadgesAwardsAndPins.pdf" class="button button-goodreads" rel="noopener" role="button">Badges, Journeys, Awards</a>

              <!-- Uniform Diagram-->
              <a href="https://online.flippingbook.com/view/150230211/" class="button button-goodreads" rel="noopener" role="button">Uniform Diagram</a>

              <!-- Brownie Year 1 Planner-->
              <a href="https://www.girlscouts.org/content/dam/gsusa/forms-and-documents/members/troop-year-planner/GSUSA_Troop-Year-Planner_Brownie_Year-1.pdf" class="button button-goodreads" rel="noopener" role="button">Brownie Year 1 Planner</a>

              <!-- Brownie Year 2 Planner-->
              <a href="https://www.girlscouts.org/content/dam/gsusa/forms-and-documents/members/troop-year-planner/GSUSA_Troop-Year-Planner_Brownie_Year_2.pdf" class="button button-goodreads" rel="noopener" role="button">Brownie Year 2 Planner/a>

              <!-- Brownie Badge Actvities-->
              <a href="https://www.girlscouts.org/en/activity-zone/grade-levels/brownie-badge-activities.html" class="button button-goodreads" rel="noopener" role="button">Brownie Badge Activities</a>

              <!-- SUPERPOWER Activity Book-->
              <a href="https://www.girlscouts.org/content/dam/gsusa/forms-and-documents/get-involved/GSUSA_FallMembership_Booklet_DigitalDownload.pdf" class="button button-goodreads" rel="noopener" role="button">SUPERPOWER Activity Book</a>

              <!-- New & Updated Programs-->
              <a href="https://www.girlscouts.org/en/members/for-girl-scouts/badges-journeys-awards/new-programs.html" class="button button-goodreads" rel="noopener" role="button">New & Updated Programs</a>

              <!-- Brownie Scout Shop-->
              <a href="https://www.girlscoutshop.com/adults/troop-year-plans/brownie-year-1" class="button button-goodreads" rel="noopener" role="button">Brownie Scout Shop</a>

              
      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <a href="privacy.html">Privacy Policy</a> | Created by <a href="https://littlelink.io" target="_blank" rel="noopener">TroopLoop</a>
      </footer>

    </div>
  </div>

</body>

</html>
